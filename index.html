<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
        <script src="https://cdn.tailwindcss.com"></script>
		<title>Atividade Algebra Linear</title>
		<style>
			body { margin: 0; }
		</style>
	</head>
	<body class="m-0 p-0">

        <div class="bg-transparent w-1/4 h-1/4 rounded-lg fixed top-0 left-0">
            <div class="bg-black flex flex-col w-80 border border-gray-900 rounded-lg px-8 py-10 m-3">
            <form [formGroup]="createaccount" class="flex flex-col space-y-8 mt-10">
                <h1 class="mb-4 text-4xl font-extrabold leading-none tracking-tight text-gray-900  dark:text-white">Equação paramétrica da reta</h1>
                <input type="text" placeholder="Ponto inicial (x,y,z)" class="border rounded-lg py-3 px-3 bg-black border-indigo-600 placeholder-white-500 text-white">
                <input type="text" placeholder="Vetor diretor (x,y,z)" class="border rounded-lg py-3 px-3 bg-black border-indigo-600 placeholder-white-500 text-white">
                <label class="font-bold text-lg text-white " >Qual o ponto deseja verificar se pertence a reta? 👀</label>
                <label class="font-bold text-sm" id="resposta"></label>
                <input type="text" placeholder="Ponto (x,y,z)" class="border rounded-lg py-3 px-3 bg-black border-indigo-600 placeholder-white-500 text-white">

                <button (click)="onSubmit()" class="border border-indigo-600 bg-black text-white rounded-lg py-3 font-semibold">Verificar</button>
            </form>
        </div>   
        </div>
		<script type="module" src="/main.js"></script>
	</body>
</html>
